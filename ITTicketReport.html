<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.6">
    <title>Monday.com Kanban Board Report</title>
    <link rel="stylesheet" href="report.css">
</head>
<body>
    <header>
        <h1>RHS Ticketing Report</h1>
    </header>
    
    <div class="dashboard-container">
    <header class="kpi-row">
        <div class="card kpi"><h3>Open</h3><p id="open-count">0</p></div>
        <div class="card kpi"><h3>In Progress</h3><p id="progress-count">0</p></div>
        <div class="card kpi overdue"><h3>Overdue</h3><p id="overdue-count">0</p></div>
        <div class="card kpi"><h3>Completed</h3><p id="completed-count">0</p></div>
    </header>

    <section class="chart-row">
        <div class="card"><canvas id="slaDonut"></canvas></div>
        <div class="card"><canvas id="statusPie"></canvas></div>
        <div class="card"><canvas id="locationPie"></canvas></div>
    </section>

    <section class="chart-row">
        <div class="card"><canvas id="urgencyBar"></canvas></div>
        <div class="card"><canvas id="userBar"></canvas></div>
    </section>
    </div>
    
    <script src="report.script.js"></script>
</body>
</html>
