<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.6">
    <title>Monday.com Kanban Board</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>RHS Operations Board</h1>
    </header>
    
    <div class="kanban-container">
        <div class="column" id="pending">
            <h2>Pending</h2>
            <div class="ticket-list"></div>
        </div>
        
        <div class="column" id="it-tickets">
            <h2>IT Tickets</h2>
            <div class="ticket-list"></div>
        </div>
        
        <div class="column" id="maintenance">
            <h2>Maintenance</h2>
            <div class="ticket-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
