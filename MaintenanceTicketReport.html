<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.6">
    <title>Monday.com Kanban Board Report</title>
    <link rel="stylesheet" href="report.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="dashboard-header">
        <h1>Maintenance Report</h1>
    </header>
    
    <div class="dashboard-wrapper">
    
    <div class="bento-panel kpi-cluster">
        <div class="kpi-glass neon-blue">
        <span>Open</span><h2 id="open-count">0</h2>
        </div>
        <div class="kpi-glass neon-purple">
        <span>In Progress</span><h2 id="progress-count">0</h2>
        </div>
        <div class="kpi-glass neon-red pulse">
        <span>Overdue</span><h2 id="overdue-count">0</h2>
        </div>
        <div class="kpi-glass neon-green">
        <span>Completed</span><h2 id="completed-count">0</h2>
        </div>
    </div>

    <div class="bento-panel hero-chart">
        <h3>SLA Health (On-Time vs Late)</h3>
        <div class="chart-container"><canvas id="slaDonut"></canvas></div>
    </div>

    <div class="bento-panel small-chart">
        <h3>Status Breakdown</h3>
        <div class="chart-container"><canvas id="statusPie"></canvas></div>
    </div>
    
    <div class="bento-panel small-chart">
        <h3>Location</h3>
        <div class="chart-container"><canvas id="locationPie"></canvas></div>
    </div>

    <div class="bento-panel wide-chart">
        <h3>Ticket Urgency</h3>
        <div class="chart-container"><canvas id="urgencyBar"></canvas></div>
    </div>

    <div class="bento-panel wide-chart">
        <h3>Top Requesters</h3>
        <div class="chart-container"><canvas id="userBar"></canvas></div>
    </div>

    </div>
    
    <script src="report.script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
